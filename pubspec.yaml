name: flutter_vulkan
description: Flutter widget for Vulkan 3-D rendering with native Flutter UI overlay. Android-first; iOS placeholder included.
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.11.4
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.3
  path: ^1.9.0
  dart_vulkan:
    git:
      url: https://github.com/dipflix/dart_vulkan.git
      ref: main
  vulkan_bridge:
    git:
      url: https://github.com/dipflix/vulkan_bridge.git
      ref: main

flutter:
  plugin:
    platforms:
      android:
        package: com.vkb.flutter_vulkan
        pluginClass: FlutterVulkanPlugin
      windows:
        pluginClass: FlutterVulkanPlugin
